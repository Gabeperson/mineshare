[package]
name = "mineshare"
version = "0.1.0"
description = "A small, no portforwarding reverse proxy app for local Minecraft (and other TCP, including http/https) servers"
homepage = "https://github.com/gabeperson/mineshare"
license = "Apache-2.0"
edition = "2024"
repository = "https://github.com/gabeperson/mineshare"

[dependencies]
clap = { version = "4.5.38", features = ["derive"] }
iroh = "0.35.0"
tokio = { version = "1.45.0", features = ["net", "macros", "rt-multi-thread"] }
